<!DOCTYPE html>
<html>
<head>
    <title>Commander Console</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: monospace; padding: 20px; text-align: center; }
        textarea { width: 90%; background: #111; color: #0f0; border: 1px solid #00ffcc; padding: 10px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; font-weight: bold; border-radius: 4px; }
        .red { background: #ff4444; color: white; }
        .blue { background: #0088ff; color: white; }
    </style>
</head>
<body>
    <h1>🛰️ REMOTE COMMANDER</h1>

    <h3>Send Link (Video/Image)</h3>
    <input type="text" id="urlInput" placeholder="URL here..." style="width:70%; padding:10px;">
    <button class="blue" id="sendLinkBtn">DEPLOY LINK</button>

    <hr style="border: 0.5px solid #333; margin: 30px 0;">

    <h3>Custom JS Payload</h3>
    <textarea id="codeArea" rows="8" placeholder="Paste JS code here..."></textarea><br>
    <button class="red" id="sendCodeBtn">EXECUTE CODE</button>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBONoAkyUG_U1WQZmDk6DCmzUrlFbubiFc",
            authDomain: "send-28691.firebaseapp.com",
            projectId: "send-28691",
            databaseURL: "https://send-28691-default-rtdb.firebaseio.com",
            storageBucket: "send-28691.firebasestorage.app",
            messagingSenderId: "1025633246051",
            appId: "1:1025633246051:web:183579b0ea8d86cef99156"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Send a Link
        document.getElementById('sendLinkBtn').addEventListener('click', () => {
            const url = document.getElementById('urlInput').value;
            set(ref(db, 'shared/payload'), {
                type: "link",
                url: url,
                timestamp: Date.now()
            }).then(() => alert("Link Pushed."));
        });

        // Send Raw Code
        document.getElementById('sendCodeBtn').addEventListener('click', () => {
            const code = document.getElementById('codeArea').value;
            set(ref(db, 'shared/payload'), {
                type: "code",
                code: code,
                timestamp: Date.now()
            }).then(() => alert("Payload Deployed."));
        });
    </script>
</body>
</html>
