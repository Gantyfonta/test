<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Link Sender</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; }
        input { width: 350px; padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; font-size: 16px; }
        button { padding: 12px 24px; background: #00ffcc; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #121212; }
        button:hover { background: #00cca3; }
    </style>
</head>
<body>
    <h1>🔗 Link Pusher</h1>
    <input type="text" id="linkInput" placeholder="Paste YouTube, Twitch, or Image URL">
    <button id="sendBtn">Send to Extension</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBONoAkyUG_U1WQZmDk6DCmzUrlFbubiFc",
            authDomain: "send-28691.firebaseapp.com",
            projectId: "send-28691",
            databaseURL: "https://send-28691-default-rtdb.firebaseio.com",
            storageBucket: "send-28691.firebasestorage.app",
            messagingSenderId: "1025633246051",
            appId: "1:1025633246051:web:183579b0ea8d86cef99156"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('sendBtn').addEventListener('click', () => {
            const url = document.getElementById('linkInput').value;
            if (url) {
                set(ref(db, 'shared/currentVideo'), {
                    url: url,
                    timestamp: Date.now()
                }).then(() => {
                    document.getElementById('linkInput').value = "";
                    alert("Sent successfully!");
                });
            }
        });
    </script>
</body>
</html>
